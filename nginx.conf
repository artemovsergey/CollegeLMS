events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;
        client_max_body_size 100M;

        set $api_upstream http://api:8080;
        set $frontend_upstream http://frontend:3000;

        location /api/ {
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /swagger/ {
            proxy_pass $api_upstream/swagger/;
            proxy_set_header Host $host;
        }

        location /opencode/ {
            proxy_pass http://host.docker.internal:4096/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
        }

        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # OpenCode SPA assets (не конфликтуют с Next.js /_next/static/)
        location /assets/ {
            proxy_pass http://host.docker.internal:4096/assets/;
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        location /favicon-v3.ico { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /favicon-96x96-v3.png { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /favicon-v3.svg { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /apple-touch-icon-v3.png { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /site.webmanifest { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /social-share.png { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }

        location / {
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
