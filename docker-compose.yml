networks:
  collegelms-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nuget_packages:
  uploads_data:

services:
  db:
    image: postgres:16-alpine
    container_name: collegelms-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-collegelms}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - collegelms-net

  redis:
    image: redis:7-alpine
    container_name: collegelms-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - collegelms-net

  api:
    build:
      context: .
      dockerfile: CollegeLMS.API/Dockerfile
      target: final
    container_name: collegelms-api
    ports:
      - "${API_PORT:-5026}:8080"
    volumes:
      - ./import:/import
      - uploads_data:/app/uploads
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${DB_NAME:-collegelms};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - collegelms-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.fast
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: collegelms-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - collegelms-net

  nginx:
    build: ./nginx
    container_name: collegelms-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - uploads_data:/var/www/uploads
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - collegelms-net

  agentbridge:
    build:
      context: .
      dockerfile: agentbridge/Dockerfile
    container_name: collegelms-agentbridge
    ports:
      - "${AGENTBRIDGE_PORT:-5030}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN:-}
      Telegram__AllowedUserIds__0: ${TELEGRAM_ALLOWED_USER_ID:-}
      VkMax__AccessToken: ${VK_ACCESS_TOKEN:-}
      VkMax__GroupId: ${VK_GROUP_ID:-0}
      VkMax__ConfirmationCode: ${VK_CONFIRMATION_CODE:-}
      OpenCode__ServerUrl: ${OPENCODE_SERVER_URL:-http://host.docker.internal:4096}
      OpenCode__Username: ${OPENCODE_USERNAME:-opencode}
      OpenCode__Password: ${OPENCODE_PASSWORD:-}
      OpenCode__DefaultModel: ${OPENCODE_DEFAULT_MODEL:-opencode/deepseek-v4-flash-free}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - collegelms-net
