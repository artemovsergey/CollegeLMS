name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_ALLOWED_USER_ID: ${{ secrets.TELEGRAM_ALLOWED_USER_ID }}
  JWT_KEY: ${{ secrets.JWT_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,TELEGRAM_BOT_TOKEN,TELEGRAM_ALLOWED_USER_ID,JWT_KEY
          script: |
            set -e
            cd /home/user1/CollegeLMS

            echo "=== Free disk space (before cleanup) ==="
            df -h /

            echo "=== Clean Docker cache before anything ==="
            docker builder prune -af
            docker image prune -f

            echo "=== Store current commit for rollback ==="
            PREVIOUS_COMMIT=$(git rev-parse HEAD)

            echo "=== git pull ==="
            git fetch origin master
            git reset --hard origin/master

            echo "=== .env from secrets ==="
            {
              echo "DB_PORT=5432"
              echo "DB_USER=postgres"
              echo "DB_PASSWORD=${DB_PASSWORD}"
              echo "DB_NAME=collegelms"
              echo "REDIS_PORT=6379"
              echo "API_PORT=5026"
              echo "ASPNETCORE_ENVIRONMENT=Production"
              echo "NGINX_HTTP_PORT=80"
              echo "NGINX_HTTPS_PORT=443"
              echo "TELEGRAM_BOT_PORT=5030"
              echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
              echo "TELEGRAM_ALLOWED_USER_ID=${TELEGRAM_ALLOWED_USER_ID}"
              echo "JWT_KEY=${JWT_KEY}"
              echo "OPENCODE_SERVER_URL=http://host.docker.internal:4096"
              echo "OPENCODE_USERNAME=opencode"
              echo "OPENCODE_PASSWORD="
              echo "OPENCODE_DEFAULT_MODEL=opencode/deepseek-v4-flash-free"
            } > .env

            echo "=== Stop old containers ==="
            docker compose --profile telegram-bot down --remove-orphans || true

            echo "=== Build & start all services ==="
            docker compose --profile telegram-bot up --build -d --force-recreate

            echo "=== Health check ==="
            sleep 10
            API_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5026/healthz || echo "000")
            if [ "$API_HEALTH" != "200" ]; then
              echo "API health check FAILED (HTTP $API_HEALTH). Starting rollback..."
              git reset --hard "$PREVIOUS_COMMIT"
              docker compose --profile telegram-bot up --build -d --force-recreate
              echo "Rollback complete."
              exit 1
            fi
            echo "API health check PASSED"

            curl -s http://localhost:5030/health || echo "Warning: Telegram bot not responding"

            echo "=== Final cleanup ==="
            docker image prune -f
            docker builder prune -f
