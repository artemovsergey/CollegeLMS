name: Test and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: collegelms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore CollegeLMS.API/CollegeLMS.csproj && dotnet restore CollegeLMS.Tests/CollegeLMS.Tests.csproj

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build CollegeLMS.API/CollegeLMS.csproj --no-restore -c Release && dotnet build CollegeLMS.Tests/CollegeLMS.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test CollegeLMS.Tests/CollegeLMS.Tests.csproj --no-build -c Release --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=collegelms_test;Username=postgres;Password=postgres

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  deploy:
    needs: [test-api, test-frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,TELEGRAM_BOT_TOKEN,TELEGRAM_ALLOWED_USER_ID
          script: |
            set -e
            cd /home/user1/CollegeLMS

            git pull origin master

            cat > .env << ENVEOF
            DB_PORT=5432
            DB_USER=postgres
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME=collegelms
            REDIS_PORT=6379
            API_PORT=5026
            ASPNETCORE_ENVIRONMENT=Production
            NGINX_HTTP_PORT=80
            NGINX_HTTPS_PORT=443
            AGENTBRIDGE_PORT=5030
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_ALLOWED_USER_ID=$TELEGRAM_ALLOWED_USER_ID
            OPENCODE_SERVER_URL=http://host.docker.internal:4096
            OPENCODE_USERNAME=opencode
            OPENCODE_PASSWORD=
            OPENCODE_DEFAULT_MODEL=opencode/deepseek-v4-flash-free
            VK_ACCESS_TOKEN=
            VK_GROUP_ID=0
            VK_CONFIRMATION_CODE=
            ENVEOF

            # Ensure UFW allows internal bridge traffic to OpenCode
            ufw allow from 172.18.0.0/16 to any port 4096 proto tcp comment 'OpenCode agent bridge' 2>/dev/null || true

            docker compose up --build -d

            # Sync DB password — volume may have old password from first deploy
            docker compose exec -T db psql -U postgres -c "ALTER USER postgres PASSWORD '${DB_PASSWORD}';" 2>/dev/null || echo "Password already correct"

            # Force restart API to clear Docker restart backoff from repeated crashes
            docker compose restart api 2>/dev/null || true

            docker compose exec -T api dotnet ef database update -- --provider Npgsql 2>/dev/null || echo "Migration skipped"

            # Import WordPress news data (idempotent — skips duplicates by slug)
            echo "=== Importing WordPress news ==="
            for i in $(seq 1 18); do
              if curl -sf http://localhost:5026/api/news/categories > /dev/null 2>&1; then
                echo "API ready after ${i}s"
                break
              fi
              echo "Waiting for API... ${i}s"
              sleep 5
            done
            TOKEN=$(curl -s -X POST http://localhost:5026/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"admin@collegelms.ru","password":"admin"}' \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['token'])" 2>/dev/null || echo "")
            if [ -n "$TOKEN" ]; then
              echo "Importing WordPress posts..."
              curl -s -X POST "http://localhost:5026/api/import/wordpress?path=/import/wp_data_full.json" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                | python3 -m json.tool || echo "Import failed or already done"
            else
              echo "Skipping import — could not get admin token"
            fi

            docker image prune -f
