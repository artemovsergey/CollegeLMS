name: Test and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: collegelms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore CollegeLMS.API/CollegeLMS.csproj && dotnet restore CollegeLMS.Tests/CollegeLMS.Tests.csproj

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build CollegeLMS.API/CollegeLMS.csproj --no-restore -c Release && dotnet build CollegeLMS.Tests/CollegeLMS.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test CollegeLMS.Tests/CollegeLMS.Tests.csproj --no-build -c Release --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=collegelms_test;Username=postgres;Password=postgres

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  deploy:
    needs: [test-api, test-frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Upload import data (72MB wp_data_full.json excluded from git)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "import/wp_data_full.json"
          target: "/home/user1/CollegeLMS/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,TELEGRAM_BOT_TOKEN,TELEGRAM_ALLOWED_USER_ID
          script: |
            set -e
            cd /home/user1/CollegeLMS

            git pull origin master

            # WARNING: bash heredoc corrupts passwords with $ and special chars
            # Python writes .env safely — it reads env vars natively
            python3 << 'PYEOF'
            import os
            with open('.env', 'w') as f:
                f.write('DB_PORT=5432\n')
                f.write('DB_USER=postgres\n')
                f.write(f"DB_PASSWORD={os.environ.get('DB_PASSWORD', 'postgres')}\n")
                f.write('DB_NAME=collegelms\n')
                f.write('REDIS_PORT=6379\n')
                f.write('API_PORT=5026\n')
                f.write('ASPNETCORE_ENVIRONMENT=Production\n')
                f.write('NGINX_HTTP_PORT=80\n')
                f.write('NGINX_HTTPS_PORT=443\n')
                f.write('AGENTBRIDGE_PORT=5030\n')
                f.write(f"TELEGRAM_BOT_TOKEN={os.environ.get('TELEGRAM_BOT_TOKEN', '')}\n")
                f.write(f"TELEGRAM_ALLOWED_USER_ID={os.environ.get('TELEGRAM_ALLOWED_USER_ID', '')}\n")
                f.write('OPENCODE_SERVER_URL=http://host.docker.internal:4096\n')
                f.write('OPENCODE_USERNAME=opencode\n')
                f.write('OPENCODE_PASSWORD=\n')
                f.write('OPENCODE_DEFAULT_MODEL=opencode/deepseek-v4-flash-free\n')
                f.write('VK_ACCESS_TOKEN=\n')
                f.write('VK_GROUP_ID=0\n')
                f.write('VK_CONFIRMATION_CODE=\n')
            PYEOF

            # Ensure UFW allows internal bridge traffic to OpenCode
            ufw allow from 172.18.0.0/16 to any port 4096 proto tcp comment 'OpenCode agent bridge' 2>/dev/null || true

            docker compose up --build -d

            # Sync DB password — volume may have old password from first deploy
            python3 << 'PYEOF'
            import os, subprocess
            pw = os.environ.get('DB_PASSWORD', 'postgres')
            pw_escaped = pw.replace("'", "''")
            r = subprocess.run([
                'docker', 'compose', 'exec', '-T', 'db', 'psql', '-U', 'postgres',
                '-c', f"ALTER USER postgres PASSWORD '{pw_escaped}';"
            ], capture_output=True, text=True)
            if r.returncode == 0:
                print("ALTER ROLE succeeded")
            else:
                print(f"ALTER ROLE skipped: {r.stderr.strip()}")
            PYEOF

            # Force restart API to clear Docker restart backoff from repeated crashes
            docker compose kill api 2>/dev/null || true
            docker compose up -d api --no-deps

            docker compose exec -T api dotnet ef database update -- --provider Npgsql 2>/dev/null || echo "Migration skipped"

            # Import WordPress news data (idempotent — skips duplicates by slug)
            echo "=== Importing WordPress news ==="
            for i in $(seq 1 25); do
              if curl -sf http://localhost:5026/api/news/categories > /dev/null 2>&1; then
                echo "API ready after ${i}s"
                break
              fi
              echo "Waiting for API... ${i}s"
              sleep 5
            done
            TOKEN=$(curl -s -X POST http://localhost:5026/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"admin@collegelms.ru","password":"admin"}' \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['token'])" 2>/dev/null || echo "")
            if [ -n "$TOKEN" ]; then
              echo "Importing WordPress posts..."
              curl -s -X POST "http://localhost:5026/api/import/wordpress?path=/import/wp_data_full.json" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                | python3 -m json.tool || echo "Import failed or already done"
            else
              echo "Skipping import — could not get admin token"
              echo "=== API container status ==="
              docker compose ps --all api
              echo "=== API logs ==="
              docker compose logs --tail=50 api 2>&1 | head -50
            fi

            docker image prune -f
