name: Test and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: collegelms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore CollegeLMS.API/CollegeLMS.csproj && dotnet restore CollegeLMS.Tests/CollegeLMS.Tests.csproj

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting (changed files only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.base_ref }}"
            CHANGED=$(git diff --name-only "origin/${BASE}...HEAD" -- '*.cs' || true)
          else
            CHANGED=$(git diff --name-only HEAD~1...HEAD -- '*.cs' || true)
          fi
          if [ -n "$CHANGED" ]; then
            echo "$CHANGED" | xargs dotnet csharpier check
          else
            echo "No .cs files changed, skipping format check"
          fi

      - name: Build
        run: dotnet build CollegeLMS.API/CollegeLMS.csproj --no-restore -c Release && dotnet build CollegeLMS.Tests/CollegeLMS.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test CollegeLMS.Tests/CollegeLMS.Tests.csproj --no-build -c Release --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=collegelms_test;Username=postgres;Password=postgres
          Jwt__Key: test-secret-key-for-ci-minimum-32-bytes!

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  deploy:
    needs: [test-api, test-frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,TELEGRAM_BOT_TOKEN,TELEGRAM_ALLOWED_USER_ID,JWT_KEY
          script: |
            set -e
            cd /home/user1/CollegeLMS

            git pull origin master

            {
              echo "DB_PORT=5432"
              echo "DB_USER=postgres"
              echo "DB_PASSWORD=${DB_PASSWORD}"
              echo "DB_NAME=collegelms"
              echo "REDIS_PORT=6379"
              echo "API_PORT=5026"
              echo "ASPNETCORE_ENVIRONMENT=Production"
              echo "NGINX_HTTP_PORT=80"
              echo "NGINX_HTTPS_PORT=443"
              echo "AGENTBRIDGE_PORT=5030"
              echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
              echo "TELEGRAM_ALLOWED_USER_ID=${TELEGRAM_ALLOWED_USER_ID}"
              echo "JWT_KEY=${JWT_KEY:-clm_jwt_secret_fallback_2026}"
              echo "OPENCODE_SERVER_URL=http://host.docker.internal:4096"
              echo "OPENCODE_USERNAME=opencode"
              echo "OPENCODE_PASSWORD="
              echo "OPENCODE_DEFAULT_MODEL=opencode/deepseek-v4-flash-free"
              echo "VK_ACCESS_TOKEN="
              echo "VK_GROUP_ID=0"
              echo "VK_CONFIRMATION_CODE="
            } > .env

            echo "=== .env JWT_KEY ==="
            grep JWT_KEY .env
            echo "=== Docker env check ==="
            docker compose exec -T api env | grep -i jwt || true

            # Ensure UFW allows internal bridge traffic to OpenCode
            ufw allow from 172.18.0.0/16 to any port 4096 proto tcp comment 'OpenCode agent bridge' 2>/dev/null || true

            # Start DB first and sync password BEFORE API starts
            # Recreate DB volume to ensure correct password
            docker compose down db 2>/dev/null || true
            docker volume rm collegelms_postgres_data 2>/dev/null || true
            docker compose up -d db redis
            docker compose exec -T db pg_isready -U postgres --timeout=10 || true
            sleep 5

            # Now build and start everything
            docker compose up --build -d

            docker compose exec -T api dotnet ef database update -- --provider Npgsql 2>/dev/null || echo "Migration skipped"

            # Import WordPress news data (idempotent — skips duplicates by slug)
            echo "=== Waiting for API to be ready ==="
            curl --retry 25 --retry-delay 5 --retry-all-errors -sf http://localhost:5026/api/health > /dev/null 2>&1 && echo "API ready" || echo "API not ready after timeout"
            TOKEN=$(curl -s -X POST http://localhost:5026/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"login":"admin","password":"admin"}' \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['token'])" 2>/dev/null || echo "")
            if [ -n "$TOKEN" ]; then
              echo "Importing WordPress posts..."
              curl -s -X POST "http://localhost:5026/api/import/wordpress?path=/import/wp_data_full.json" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                | python3 -m json.tool || echo "Import failed or already done"
            else
              echo "Skipping import — could not get admin token"
              echo "=== API container status ==="
              docker compose ps --all api
              echo "=== API logs ==="
              docker compose logs --tail=50 api 2>&1 | head -50
            fi

            docker image prune -f
