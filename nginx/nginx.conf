events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    # CollegeLMS сайт + API
    server {
        listen 80;
        server_name _;
        client_max_body_size 100M;

        location /api/ {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /chat/ {
            alias /var/www/chat/;
            index index.html;
        }

        location /swagger/ {
            proxy_pass http://api:8080/swagger/;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # OpenCode SPA + Swagger
    server {
        listen 5001;
        server_name _;
        client_max_body_size 100M;

        # OpenCode SPA
        location / {
            proxy_pass http://host.docker.internal:4096;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
        }

        # OpenCode API endpoints
        location ~ ^/api/(agent|command|config|credential|event|fs/|health|integration|location|model|permission|provider|pty|question|reference|session|skill) {
            proxy_pass http://host.docker.internal:4096;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
        }

        location ~ ^/(agent|auth/|command|config|event|experimental|file|find|formatter|global|instance/|log|lsp|mcp|new-session|path|permission|project|provider|pty|question|session|skill|sync/|tui/|vcs) {
            proxy_pass http://host.docker.internal:4096;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
        }

        # OpenCode static assets
        location /assets/ {
            proxy_pass http://host.docker.internal:4096/assets/;
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        location /favicon-v3.ico { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /favicon-96x96-v3.png { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /favicon-v3.svg { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /apple-touch-icon-v3.png { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /site.webmanifest { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }
        location /social-share.png { proxy_pass http://host.docker.internal:4096; proxy_set_header Host $host; }

        # Swagger
        location /swagger/ {
            proxy_pass http://api:8080/swagger/;
            proxy_set_header Host $host;
        }

        # CollegeLMS API (fallback)
        location /api/ {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
